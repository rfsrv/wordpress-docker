name: Build and push WordPress images

on:
  push:
    branches:
      - main
    paths:
      - "*/*/Dockerfile"
      - "docker-bake.hcl"
      - ".github/workflows/build-push.yml"
  schedule:
    # Weekly rebuild to pick up upstream WordPress/PHP patches (Mondays 04:00 UTC)
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      phpredis_version:
        description: "phpredis PECL version (e.g. 6.0.2)"
        required: false
        default: "6.0.2"

env:
  REGISTRY: ghcr.io/rfsrv

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all variants
        uses: docker/bake-action@v5
        with:
          files: docker-bake.hcl
          push: true
        env:
          REGISTRY: ${{ env.REGISTRY }}
          PHPREDIS_VERSION: ${{ inputs.phpredis_version || '6.0.2' }}
